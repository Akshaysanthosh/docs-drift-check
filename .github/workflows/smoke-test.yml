name: Smoke Test

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run smoke test
        run: bash tests/smoke_test.sh

      - name: Run plugin smoke test
        run: bash tests/plugin_smoke_test.sh
