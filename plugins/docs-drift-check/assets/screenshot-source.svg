  <text x="132" y="610" fill="#0F172A" font-family="Inter, Helvetica, Arial, sans-serif" font-size="52" font-weight="700">Catch likely documentation drift before it ships</text>
  <text x="132" y="668" fill="#334155" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28">Flags high-signal changes like renamed dev commands, new API endpoints, setup env vars,</text>
